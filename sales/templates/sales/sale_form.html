{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2>Delete Sale</h2>
    <p>Are you sure you want to delete "{{ sale.title }}"?</p>
    <form id="deleteForm" method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'sales_list' %}" class="btn btn-secondary">Back to Listings</a>
    </form>
</div>

{% endblock content %}
